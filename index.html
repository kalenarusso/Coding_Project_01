<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Feedback Form</title>
    <link rel="stylesheet" href="styles.css">   
</head>
<body>
    <header>
        <h1>User Feedback Form</h1>
        <p>Please share your thoughts and suggestions with us!</p>
    </header>
    <form action="">
        <input type="text" id="username" placeholder="Input username..." class="tooltip-input" data-tooltip="Please insert username here!" required>
        <input type="email" id="email" placeholder="Input email..." class="tooltip-input" data-tooltip="Please insert email here!" required>
        <textarea name="comments" id="comments" placeholder="Write a comment..." maxlength="500" class="tooltip-input" data-tooltip="Write your comment here!" required></textarea>
            <div>
            <p>Character count: <span id="count">0</span> / 500</p>
            </div>
        <div id="tooltip"></div>
        <button type="submit">Submit</button>
    </form>
    
    <section>
        <h2>Feedback Box</h2>
        <div id="feedback-display"> </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
